<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT Tablet</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="tablet-container" style="display: none;">
        <!-- Screen overlay for dynamic content -->
        <div class="screen-overlay" id="mdt-screen">
            <!-- Content will be injected here -->
        </div>
        <!-- Using object tag to maintain SVG interactivity -->
        <object id="tablet-svg" data="mdt_interactive.svg" type="image/svg+xml"></object>
    </div>
    <script src="script.js"></script>
</body>

</html>
